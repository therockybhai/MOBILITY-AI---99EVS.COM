name: Predictive Risk Forecast Layer Validator

on:
  workflow_dispatch:

jobs:
  prfl-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Validate PRFL presence
        run: |
          if [ -f PREDICTIVE_RISK_FORECAST_LAYER.md ]; then
            echo "PRFL module ready"
          else
            echo "Missing PRFL module"
            exit 1
          fi
