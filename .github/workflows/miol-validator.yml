name: Machine Intelligence Orchestration Layer Validator

on:
  workflow_dispatch:

jobs:
  miol-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Validate MIOL presence
        run: |
          if [ -f MACHINE_INTELLIGENCE_ORCHESTRATION_LAYER.md ]; then
            echo "MIOL module ready"
          else
            echo "Missing MIOL module"
            exit 1
          fi
