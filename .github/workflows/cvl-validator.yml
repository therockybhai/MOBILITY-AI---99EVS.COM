name: Certificate Verification Layer Validator

on:
  workflow_dispatch:

jobs:
  cvl-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Validate CVL presence
        run: |
          if [ -f CERTIFICATE_VERIFICATION_LAYER.md ]; then
            echo "CVL module ready"
          else
            echo "Missing CVL module"
            exit 1
          fi
