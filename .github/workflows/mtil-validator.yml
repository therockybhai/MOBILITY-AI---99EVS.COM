name: Machine Telemetry Interface Layer Validator

on:
  workflow_dispatch:

jobs:
  mtil-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Validate MTIL presence
        run: |
          if [ -f MACHINE_TELEMETRY_INTERFACE_LAYER.md ]; then
            echo "MTIL module ready"
          else
            echo "Missing MTIL module"
            exit 1
          fi
