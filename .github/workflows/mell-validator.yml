name: Machine Event Logging Layer Validator

on:
  workflow_dispatch:

jobs:
  mell-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Validate MELL presence
        run: |
          if [ -f MACHINE_EVENT_LOGGING_LAYER.md ]; then
            echo "MELL module ready"
          else
            echo "Missing MELL module"
            exit 1
          fi
