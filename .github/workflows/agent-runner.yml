name: 99EVS Agent Pipeline Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  agent-maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Run regression tests
        run: |
          if [ -f package.json ]; then
            npm run test || true
          fi

      - name: Validate serverless compatibility
        run: |
          echo "Checking for browser-only APIs..."
          ! grep -R "btoa(" api/ || echo "Warning: browser-only API detected"

      - name: Confirm branding consistency
        run: |
          grep -R "99EVs" . && echo "Brand mismatch found" || echo "Brand OK"

      - name: Agent pipeline verification
        run: |
          echo "AGENT_PIPELINE.md detected"
