<style>
/* ── VARIABLES ── */
:root{
  --g:#00E676;--g2:#00C853;--g3:#69F0AE;
  --bg:#070D0A;--bg2:#0C1410;--bg3:#111A15;--bg4:#151F18;
  --border:rgba(0,230,118,0.12);--border2:rgba(0,230,118,0.06);
  --gdim:rgba(0,230,118,0.07);
  --t1:#EEF4F0;--t2:#8BA899;--t3:#3D5C4A;
  --red:#FF4757;--amber:#FFA502;--blue:#40C4FF;
  --fd:'Barlow Condensed',sans-serif;
  --fb:'DM Sans',sans-serif;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);overflow-x:hidden;}

/* ── PAGE SYSTEM ── */
.pg{display:none;min-height:100vh;flex-direction:column;}
.pg.on{display:flex;}
.cpg{display:none;height:100vh;flex-direction:column;}
.cpg.on{display:flex;}
.kpg{display:none;height:100vh;flex-direction:row;}
.kpg.on{display:flex;}

/* ── TYPOGRAPHY ── */
h1,h2,h3,.disp{font-family:var(--fd);font-weight:900;line-height:1.05;}
.disp{font-size:clamp(44px,7vw,88px);text-transform:uppercase;}
h1{font-size:clamp(30px,5vw,60px);text-transform:uppercase;}
h2{font-size:clamp(22px,3vw,38px);text-transform:uppercase;}
h3{font-size:clamp(16px,2vw,22px);text-transform:uppercase;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:var(--r);font-weight:600;font-size:14px;cursor:pointer;border:none;font-family:var(--fb);transition:all .2s;letter-spacing:.01em;}
.btn-p{background:linear-gradient(135deg,var(--g),var(--g2));color:#000;font-weight:700;}
.btn-p:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,230,118,.28);}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--t2);}
.btn-g:hover{border-color:var(--g);color:var(--g);}
.btn-o{background:transparent;border:1px solid var(--g);color:var(--g);}
.btn-o:hover{background:var(--gdim);}

/* ── CHIP ── */
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;border:1px solid var(--border);background:var(--gdim);font-size:11px;color:var(--g);font-weight:600;letter-spacing:.04em;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--g);flex-shrink:0;}
.dot-p{animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.4)}50%{box-shadow:0 0 0 6px rgba(0,230,118,0)}}

/* ── BADGES ── */
.badge{padding:3px 9px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.b-g{background:rgba(0,230,118,.1);color:var(--g);border:1px solid rgba(0,230,118,.2);}
.b-a{background:rgba(255,165,2,.1);color:var(--amber);border:1px solid rgba(255,165,2,.2);}
.b-r{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2);}
.b-b{background:rgba(64,196,255,.1);color:var(--blue);border:1px solid rgba(64,196,255,.2);}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}
.au{animation:fadeUp .45s ease both;}
.spinner{width:13px;height:13px;border:2px solid rgba(0,0,0,.15);border-top:2px solid #000;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HOME PAGE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.hdr{padding:16px 32px;background:rgba(7,13,10,.96);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.logo{font-family:var(--fd);color:var(--g);font-size:24px;font-weight:900;letter-spacing:3px;cursor:pointer;user-select:none;}
.logo sup{font-size:9px;color:var(--t3);font-family:var(--fb);font-weight:400;margin-left:4px;}
.nav{display:flex;align-items:center;gap:6px;}
.navl{background:none;border:none;color:var(--t2);font-size:13px;font-family:var(--fb);cursor:pointer;padding:7px 12px;border-radius:6px;transition:.15s;}
.navl:hover{color:var(--t1);background:var(--bg3);}

/* ── HERO ── */
.hero{position:relative;padding:80px 32px 60px;display:flex;flex-direction:column;align-items:center;text-align:center;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 55% at 50% 0%,rgba(0,230,118,.07),transparent 70%);pointer-events:none;}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border2) 1px,transparent 1px),linear-gradient(90deg,var(--border2) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;mask-image:radial-gradient(ellipse 100% 80% at 50% 0%,black,transparent);}
.hero .chip{margin-bottom:22px;animation:fadeUp .4s ease;}
.hero h1{margin-bottom:10px;animation:fadeUp .4s .08s ease both;}
.hero h1 .g{color:var(--g);}
.hero-sub{font-size:16px;color:var(--t2);max-width:520px;line-height:1.75;font-weight:300;margin:0 auto 28px;animation:fadeUp .4s .16s ease both;}
.hero-acts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:44px;animation:fadeUp .4s .22s ease both;}
.stats{display:flex;flex-wrap:wrap;justify-content:center;border:1px solid var(--border);border-radius:12px;background:var(--bg2);overflow:hidden;animation:fadeUp .4s .28s ease both;}
.stat{padding:16px 26px;border-right:1px solid var(--border);text-align:center;}
.stat:last-child{border-right:none;}
.stat-v{font-family:var(--fd);font-size:24px;font-weight:900;color:var(--g);}
.stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}

/* ── STRIP ── */
.strip{background:var(--bg2);border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);display:flex;flex-wrap:wrap;justify-content:center;}
.strp{padding:12px 20px;border-right:1px solid var(--border2);font-size:11px;color:var(--t2);display:flex;align-items:center;gap:7px;font-weight:500;}
.strp:last-child{border-right:none;}
.strp-d{width:4px;height:4px;border-radius:50%;background:var(--g);}

/* ── SECTION BASE ── */
.sec{padding:64px 32px;}
.sec-in{max-width:1080px;margin:0 auto;}
.sec-tag{display:inline-flex;align-items:center;gap:7px;padding:4px 12px;border-radius:100px;border:1px solid var(--border);background:var(--gdim);font-size:10px;color:var(--g);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;}
.sec-sub{font-size:14px;color:var(--t2);max-width:520px;line-height:1.75;font-weight:300;margin-top:8px;}

/* ── HOW IT WORKS ── */
.hiw{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:36px;background:var(--border);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.hiw-s{background:var(--bg2);padding:26px 22px;}
.hiw-n{font-family:var(--fd);font-size:44px;font-weight:900;color:var(--g);opacity:.18;line-height:1;margin-bottom:10px;}
.hiw-t{font-family:var(--fd);font-size:16px;font-weight:700;text-transform:uppercase;color:var(--t1);margin-bottom:7px;}
.hiw-d{font-size:13px;color:var(--t2);line-height:1.7;}

/* ── CAPABILITIES ── */
.caps{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:36px;}
.cap{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:20px;transition:.25s;}
.cap:hover{border-color:var(--border);transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.3);}
.cap-ic{font-size:26px;margin-bottom:10px;}
.cap-t{font-family:var(--fd);font-size:16px;font-weight:700;text-transform:uppercase;color:var(--t1);margin-bottom:5px;}
.cap-d{font-size:12px;color:var(--t2);line-height:1.7;}
.cap-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;}
.ctag{padding:2px 7px;border-radius:4px;font-size:10px;background:var(--bg3);color:var(--t3);border:1px solid var(--border2);}

/* ── LEARN PREVIEW ── */
.lgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:28px;}
.lcard{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:18px;cursor:pointer;transition:.2s;display:flex;align-items:flex-start;gap:12px;}
.lcard:hover{border-color:var(--g);transform:translateX(3px);}
.lcard-ic{font-size:20px;flex-shrink:0;margin-top:1px;}
.lcard-t{font-weight:600;font-size:13px;color:var(--t1);margin-bottom:4px;}
.lcard-d{font-size:11px;color:var(--t2);line-height:1.6;}
.lcard-arr{margin-left:auto;color:var(--t3);font-size:13px;flex-shrink:0;align-self:center;}

/* ── CTA ── */
.cta{background:linear-gradient(135deg,rgba(0,230,118,.07),rgba(0,200,83,.03));border:1px solid var(--border);border-radius:14px;padding:44px 36px;text-align:center;position:relative;overflow:hidden;}
.cta::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,230,118,.04),transparent 60%);pointer-events:none;}
.cta h2{margin-bottom:10px;}
.cta p{color:var(--t2);margin-bottom:24px;font-size:14px;font-weight:300;}

/* ── FOOTER ── */
.ftr{background:var(--bg2);border-top:1px solid var(--border2);padding:36px 32px 20px;}
.ftr-in{max-width:1080px;margin:0 auto;}
.ftr-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:36px;margin-bottom:28px;}
.ftr-logo{font-family:var(--fd);color:var(--g);font-size:20px;font-weight:900;letter-spacing:2px;display:block;margin-bottom:8px;cursor:pointer;}
.ftr-desc{font-size:12px;color:var(--t3);line-height:1.7;max-width:240px;}
.ftr-col h4{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-weight:700;}
.flink{display:block;font-size:12px;color:var(--t2);margin-bottom:6px;cursor:pointer;background:none;border:none;text-align:left;font-family:var(--fb);transition:.15s;}
.flink:hover{color:var(--g);}
.ftr-bot{border-top:1px solid var(--border2);padding-top:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.ftr-copy{font-size:11px;color:var(--t3);}

/* ── WA FLOAT ── */
.wa{position:fixed;bottom:22px;right:22px;width:50px;height:50px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;z-index:999;box-shadow:0 4px 18px rgba(37,211,102,.4);transition:.2s;text-decoration:none;}
.wa:hover{transform:scale(1.1);}

/* ── COOKIE ── */
.cookie{position:fixed;bottom:0;left:0;right:0;background:var(--bg3);border-top:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;z-index:998;font-size:12px;color:var(--t2);flex-wrap:wrap;}
.cookie.gone{display:none;}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   AUTH MODAL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:400px;padding:30px;position:relative;animation:fadeUp .25s ease;}
.modal-x{position:absolute;top:13px;right:14px;background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;padding:2px 5px;line-height:1;transition:.15s;}
.modal-x:hover{color:var(--t1);}
.modal-title{font-family:var(--fd);font-size:24px;font-weight:900;text-transform:uppercase;color:var(--t1);margin-bottom:3px;}
.modal-sub{font-size:12px;color:var(--t2);margin-bottom:20px;font-weight:300;}
.gbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;padding:11px;background:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:#1a1a1a;transition:.2s;margin-bottom:16px;font-family:var(--fb);}
.gbtn:hover{background:#f5f5f5;box-shadow:0 2px 10px rgba(0,0,0,.15);}
.gbtn svg{width:17px;height:17px;flex-shrink:0;}
.divd{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.divd hr{flex:1;border:none;border-top:1px solid var(--border);}
.divd span{font-size:10px;color:var(--t3);white-space:nowrap;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 13px;color:var(--t1);font-size:13px;outline:none;transition:.2s;font-family:var(--fb);}
.field input:focus{border-color:var(--g2);}
.field input::placeholder{color:var(--t3);}
.alert{padding:9px 12px;border-radius:7px;font-size:12px;margin-bottom:12px;display:none;}
.alert.show{display:block;}
.alert.err{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.25);color:#ff7070;}
.alert.ok{background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.2);color:var(--g);}
.swl{font-size:11px;color:var(--t3);margin-top:14px;text-align:center;}
.swl a{color:var(--g);cursor:pointer;}
.swl a:hover{text-decoration:underline;}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MOBILITYAI CHAT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.chat-hdr{height:52px;background:var(--bg2);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;}
.ch-l{display:flex;align-items:center;gap:10px;}
.ch-logo{font-family:var(--fd);font-size:17px;font-weight:900;color:var(--g);letter-spacing:2px;cursor:pointer;}
.ch-r{display:flex;align-items:center;gap:8px;}
.uav{width:28px;height:28px;border-radius:7px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--g);overflow:hidden;flex-shrink:0;}
.uav img{width:100%;height:100%;object-fit:cover;}
.uname{font-size:12px;color:var(--t1);font-weight:500;}
.sout{background:none;border:1px solid var(--border);border-radius:6px;color:var(--t3);font-size:11px;padding:4px 9px;cursor:pointer;transition:.2s;font-family:var(--fb);}
.sout:hover{border-color:var(--red);color:var(--red);}

/* vehicle prompt */
.vpbar{background:linear-gradient(135deg,rgba(0,230,118,.06),rgba(0,230,118,.02));border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:10px 18px 0;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;}
.vpbar.gone{display:none;}
.vpt{font-size:11px;color:var(--t2);}
.vpt strong{color:var(--t1);}
.vpbs{display:flex;gap:5px;flex-shrink:0;}

/* messages */
.msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:16px;}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--border);}

.wbox{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:240px;text-align:center;padding:24px;}
.wbox-ic{font-size:38px;margin-bottom:12px;}
.wbox-t{font-family:var(--fd);font-size:22px;font-weight:900;text-transform:uppercase;color:var(--t1);margin-bottom:7px;}
.wbox-s{font-size:12px;color:var(--t2);max-width:360px;line-height:1.7;margin-bottom:22px;font-weight:300;}
.sugg{display:grid;grid-template-columns:1fr 1fr;gap:7px;max-width:500px;width:100%;}
.sg{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:11px;cursor:pointer;transition:.2s;text-align:left;}
.sg:hover{border-color:var(--g);transform:translateY(-1px);}
.sg-i{font-size:15px;margin-bottom:4px;}
.sg-t{font-size:11px;font-weight:600;color:var(--t1);margin-bottom:2px;}
.sg-d{font-size:10px;color:var(--t3);}

.mrow{display:flex;gap:9px;animation:fadeUp .2s ease;}
.mrow.me{flex-direction:row-reverse;}
.av{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;overflow:hidden;}
.av.ai{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2);color:var(--g);}
.av.us{background:var(--bg3);border:1px solid var(--border);color:var(--t2);}
.av.us img{width:100%;height:100%;object-fit:cover;}
.mmeta{font-size:10px;color:var(--t3);margin-bottom:4px;}
.mrow.me .mmeta{text-align:right;}
.bub{max-width:680px;padding:12px 15px;border-radius:9px;font-size:13px;line-height:1.78;font-family:var(--fb);}
.bub.ai{background:var(--bg2);border:1px solid var(--border2);border-left:3px solid var(--g);color:var(--t1);}
.bub.us{background:var(--bg3);border:1px solid var(--border2);color:var(--t1);}
.bub strong{color:var(--g);font-weight:600;}
.bub code{background:rgba(0,0,0,.35);padding:1px 5px;border-radius:3px;font-size:11px;color:var(--blue);font-family:monospace;}
.bub h2,.bub h3{font-family:var(--fd);font-size:14px;text-transform:uppercase;color:var(--g);margin:10px 0 4px;font-weight:700;}
.bub ul,.bub ol{padding-left:17px;margin:5px 0;}
.bub li{margin-bottom:3px;}
.bub hr{border:none;border-top:1px solid var(--border);margin:10px 0;}

.typrow{display:flex;gap:9px;}
.typbub{padding:12px 15px;background:var(--bg2);border:1px solid var(--border2);border-left:3px solid var(--g);border-radius:9px;display:flex;gap:4px;align-items:center;}
.td{width:5px;height:5px;background:var(--g2);border-radius:50%;animation:bounce 1.2s infinite;}
.td:nth-child(2){animation-delay:.2s;}
.td:nth-child(3){animation-delay:.4s;}

.inp-zone{padding:10px 18px 16px;border-top:1px solid var(--border2);background:rgba(7,13,10,.7);flex-shrink:0;backdrop-filter:blur(8px);}
.inp-bar{display:flex;gap:7px;align-items:flex-end;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:9px 9px 9px 14px;transition:.2s;}
.inp-bar:focus-within{border-color:var(--g2);box-shadow:0 0 0 3px rgba(0,230,118,.05);}
