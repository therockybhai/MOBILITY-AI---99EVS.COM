<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>99EVs | Verified Mobility Support</title>
<style>
body {font-family: Arial, sans-serif; margin:0; background:#0f1c2e; color:white}
header {display:flex; justify-content:space-between; align-items:center; padding:20px 40px; background:#132642}
button {background:#f4a300; border:none; padding:12px 18px; border-radius:8px; font-weight:bold}
.container {max-width:900px; margin:auto; padding:40px}
.card {background:#1b2f4f; padding:25px; margin:15px 0; border-radius:12px}
input, select {width:100%; padding:12px; margin:8px 0; border-radius:6px; border:none}
.submit {width:100%; background:#f4a300; color:black}
footer {padding:30px; text-align:center; background:#132642}
</style>
</head>
<body>
<header>
<h2>99EVs</h2>
<div>
<button onclick="showForm('sell')">Sell Vehicle</button>
<button onclick="showForm('buy')">Need Vehicle</button>
<button onclick="showForm('value')">Check Readiness</button>
<button onclick="showForm('dealer')">Dealer Join</button>
</div>
</header><div class="container">
<h1>India's Verified Mobility Support Platform</h1>
<p>Submit your requirement. Get verified routing. Pay only when service activates.</p><div id="form-area"></div>
</div><footer>
<p>99EVs.com | Verification • Inspection • Routing • Resale Intelligence</p>
</footer><script>
function showForm(type){
let formHTML = '';

if(type==='sell'){
formHTML=`
<div class="card">
<h2>Sell Vehicle</h2>
<input placeholder="Name">
<input placeholder="Mobile">
<input placeholder="City">
<input placeholder="Vehicle Make">
<input placeholder="Model">
<input placeholder="Year">
<select>
<option>Running Condition</option>
<option>Working</option>
<option>Repair Needed</option>
</select>
<button class="submit">Submit</button>
</div>`;
}

if(type==='buy'){
formHTML=`
<div class="card">
<h2>Need Vehicle</h2>
<input placeholder="Name">
<input placeholder="Mobile">
<input placeholder="City">
<input placeholder="Vehicle Type">
<input placeholder="Budget">
<select>
<option>Finance Required?</option>
<option>Yes</option>
<option>No</option>
</select>
<button class="submit">Submit</button>
</div>`;
}

if(type==='value'){
formHTML=`
<div class="card">
<h2>Check Resale Readiness</h2>
<input placeholder="Vehicle Type">
<input placeholder="Make">
<input placeholder="Model">
<input placeholder="Year">
<input placeholder="KM Driven">
<select>
<option>Insurance Valid?</option>
<option>Yes</option>
<option>No</option>
</select>
<button class="submit">Generate Score</button>
</div>`;
}

if(type==='dealer'){
formHTML=`
<div class="card">
<h2>Dealer Partnership</h2>
<input placeholder="Dealer Name">
<input placeholder="Business Name">
<input placeholder="City">
<input placeholder="Segments Handled">
<input placeholder="Monthly Purchase Capacity">
<button class="submit">Join Network</button>
</div>`;
}

document.getElementById('form-area').innerHTML=formHTML;
}
</script></body>
</html>
