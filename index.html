<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>99EVS MobilityAI | Vehicle Intelligence for EV, Fleet & Battery</title>

<meta name="description" content="MobilityAI by 99EVS provides engineering-grade intelligence for EV batteries, fleet maintenance, diagnostics and vehicle safety.">

<link rel="canonical" href="https://www.99evs.com">

<meta property="og:title" content="MobilityAI – Vehicle Intelligence Platform">
<meta property="og:description" content="Ask MobilityAI anything about EV batteries, fleets and vehicle diagnostics.">
<meta property="og:type" content="website">

<style>

body{
font-family:Arial;
background:#0b0f0d;
color:white;
margin:0;
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #1b2e23;
}

.logo{
color:#00e676;
font-weight:700;
font-size:22px;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:48px;
}

.hero span{
color:#00e676;
}

.chat{
max-width:800px;
margin:auto;
border:1px solid #1b2e23;
border-radius:8px;
overflow:hidden;
}

.messages{
height:400px;
overflow:auto;
padding:20px;
}

.input{
display:flex;
border-top:1px solid #1b2e23;
}

textarea{
flex:1;
padding:15px;
background:#0f1613;
border:none;
color:white;
}

button{
background:#00e676;
border:none;
padding:15px 20px;
font-weight:700;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
color:#6f8a79;
}

</style>

</head>

<body>

<header>

<div class="logo">99EVS</div>

<div>
MobilityAI
</div>

</header>

<section class="hero">

<h1>
Engineering Intelligence for
<br>
<span>Every Vehicle</span>
</h1>

<p>
MobilityAI answers questions about EV batteries, fleet maintenance,
vehicle diagnostics and safety.
</p>

</section>

<section class="chat">

<div class="messages" id="messages">

MobilityAI ready. Ask about your vehicle.

</div>

<div class="input">

<textarea id="input" placeholder="Ask about EV battery health, fleet maintenance..."></textarea>

<button onclick="send()">Send</button>

</div>

</section>

<footer>

© 2026 99EVS | MobilityAI | Built for Vehicle Safety

</footer>

<script>

async function send(){

let input=document.getElementById("input")
let messages=document.getElementById("messages")

let text=input.value.trim()

if(!text)return

messages.innerHTML+="<p><b>You:</b> "+text+"</p>"

input.value=""

messages.innerHTML+="<p><b>MobilityAI:</b> thinking...</p>"

let res=await fetch("/api/chat",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({message:text})

})

let data=await res.json()

messages.lastChild.innerHTML="<b>MobilityAI:</b> "+data.reply

}

</script>

</body>

</html>
