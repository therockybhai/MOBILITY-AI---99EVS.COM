<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<title>99EVS — Mobility Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   99EVS DESIGN SYSTEM v2.0
   Brand: Precision Green | Engineering Dark
   Founder: Kiran SR | KIAI System
════════════════════════════════════════ */
:root {
  --black:        #0A0F14;
  --surface:      #0E1419;
  --surface-2:    #131C23;
  --surface-3:    #1A2530;
  --border:       #1E2D3A;
  --border-2:     #263844;
  --green:        #00E676;
  --green-2:      #00C853;
  --green-dim:    #007A3D;
  --green-glow:   rgba(0,230,118,0.10);
  --green-glow2:  rgba(0,230,118,0.05);
  --green-grad:   linear-gradient(135deg,#00E676,#00C853);
  --red:          #FF4C4C;
  --red-dim:      rgba(255,76,76,0.12);
  --amber:        #FFB300;
  --blue:         #40C4FF;
  --text-1:       #E8EDF2;
  --text-2:       #7A9BB0;
  --text-3:       #3D5468;
  --font-display: 'Syne', sans-serif;
  --font-body:    'Instrument Sans', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;
  --radius:       6px;
  --radius-lg:    12px;
  --ease:         cubic-bezier(0.4,0,0.2,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--black);
  color:var(--text-1);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* NOISE */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9998;opacity:0.5;
}

/* GRID */
.grid-bg{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,230,118,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,230,118,0.025) 1px,transparent 1px);
  background-size:44px 44px;
  pointer-events:none;z-index:0;
}

/* PAGES */
.page{display:none;min-height:100vh;flex-direction:column;}
.page.active{display:flex;animation:pageIn 0.35s var(--ease);}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ════ BUTTONS ════ */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:var(--radius);
  font-family:var(--font-body);font-size:14px;font-weight:500;
  cursor:pointer;border:1px solid transparent;
  transition:all 0.2s var(--ease);letter-spacing:0.01em;
  white-space:nowrap;text-decoration:none;
}
.btn-ghost{background:transparent;border-color:var(--border-2);color:var(--text-2);}
.btn-ghost:hover{border-color:var(--green-dim);color:var(--green);background:var(--green-glow2);}
.btn-primary{background:var(--green-grad);border-color:transparent;color:var(--black);font-weight:700;}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,230,118,0.25);}
.btn-outline{background:transparent;border-color:var(--green);color:var(--green);}
.btn-outline:hover{background:var(--green-glow);transform:translateY(-1px);}
.btn-surface{background:var(--surface-2);border-color:var(--border);color:var(--text-1);}
.btn-surface:hover{border-color:var(--border-2);background:var(--surface-3);}
.btn-danger{background:rgba(255,76,76,0.12);border-color:rgba(255,76,76,0.3);color:var(--red);}
.btn-danger:hover{background:rgba(255,76,76,0.2);}
.btn-lg{padding:13px 26px;font-size:15px;}
.btn-full{width:100%;justify-content:center;}

/* ════ LOGO ════ */
.logo{display:flex;align-items:center;gap:11px;cursor:pointer;text-decoration:none;}
.logo-mark{
  width:36px;height:36px;background:var(--green-grad);
  border-radius:var(--radius);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:800;font-size:13px;
  color:var(--black);letter-spacing:-0.5px;flex-shrink:0;
}
.logo-text{font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--text-1);letter-spacing:-0.3px;}
.logo-text span{color:var(--green);}

/* ════ BADGE / STATUS ════ */
.badge-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.75);}}

.status-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:100px;
  border:1px solid var(--border);background:var(--surface-2);
  font-size:11px;font-family:var(--font-mono);color:var(--green);
  letter-spacing:0.04em;
}

/* ════ FORM ELEMENTS ════ */
.form-group{margin-bottom:16px;}
.form-label{
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;font-weight:500;color:var(--text-2);margin-bottom:7px;
  font-family:var(--font-mono);letter-spacing:0.06em;text-transform:uppercase;
}
.form-label-right{color:var(--green);cursor:pointer;font-size:10px;}
.form-label-right:hover{text-decoration:underline;}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-icon{position:absolute;left:13px;color:var(--text-3);font-size:14px;pointer-events:none;z-index:1;}
.input-toggle{position:absolute;right:12px;color:var(--text-3);font-size:13px;cursor:pointer;z-index:1;background:none;border:none;padding:4px;transition:color 0.2s;}
.input-toggle:hover{color:var(--green);}

input[type="text"],input[type="email"],input[type="password"]{
  width:100%;padding:11px 13px 11px 40px;
  background:var(--surface-2);border:1px solid var(--border-2);border-radius:var(--radius);
  color:var(--text-1);font-family:var(--font-body);font-size:14px;
  outline:none;transition:all 0.2s var(--ease);caret-color:var(--green);
}
input:focus{border-color:var(--green-dim);background:var(--surface-3);box-shadow:0 0 0 3px rgba(0,230,118,0.07);}
input::placeholder{color:var(--text-3);}

.field-error{display:none;font-size:11px;color:var(--red);margin-top:5px;font-family:var(--font-mono);}
.field-error.show{display:block;}

/* PASSWORD STRENGTH */
.pwd-strength{margin-top:7px;display:none;}
.pwd-strength.show{display:block;}
.s-bars{display:flex;gap:3px;margin-bottom:3px;}
.s-bar{height:3px;flex:1;background:var(--border-2);border-radius:2px;transition:background 0.3s;}
.s-bar.weak{background:var(--red);}
.s-bar.fair{background:var(--amber);}
.s-bar.good{background:var(--green-2);}
.s-bar.strong{background:var(--green);}
.s-text{font-size:10px;color:var(--text-3);font-family:var(--font-mono);}

/* ALERTS */
.alert{
  padding:11px 14px;border-radius:var(--radius);font-size:13px;
  margin-bottom:14px;display:none;align-items:flex-start;gap:9px;line-height:1.5;
}
.alert.show{display:flex;}
.alert-success{background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);color:#00E676;}
.alert-error{background:var(--red-dim);border:1px solid rgba(255,76,76,0.25);color:#FF7070;}
.alert-info{background:rgba(64,196,255,0.08);border:1px solid rgba(64,196,255,0.2);color:var(--blue);}

.security-notice{
  display:flex;align-items:flex-start;gap:10px;padding:11px 13px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);
  margin:16px 0;font-size:12px;color:var(--text-3);line-height:1.5;
}
.sec-icon{color:var(--green);flex-shrink:0;}

.auth-divider{
  display:flex;align-items:center;gap:10px;margin:18px 0;
  color:var(--text-3);font-size:11px;font-family:var(--font-mono);
}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* ════ SPINNER ════ */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:15px;height:15px;border:2px solid rgba(0,230,118,0.15);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}

/* ════ TOAST ════ */
.toast{
  position:fixed;bottom:22px;right:22px;padding:11px 16px;
  background:var(--surface-2);border:1px solid var(--border-2);border-radius:var(--radius);
  font-size:13px;color:var(--text-1);z-index:10000;display:flex;align-items:center;gap:9px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:toastIn 0.3s var(--ease);max-width:300px;
}
@keyframes toastIn{from{opacity:0;transform:translateY(18px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ════ MODAL ════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);
  z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--surface);border:1px solid var(--border-2);border-radius:var(--radius-lg);
  padding:28px;max-width:380px;width:100%;animation:pageIn 0.3s var(--ease);position:relative;
}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-3);cursor:pointer;font-size:16px;padding:4px;transition:color 0.2s;}
.modal-close:hover{color:var(--text-1);}

/* ════════════════════════════════
   HOMEPAGE
════════════════════════════════ */
.home-nav{
  position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;
  padding:18px 40px;border-bottom:1px solid var(--border);
  background:rgba(10,15,20,0.85);backdrop-filter:blur(20px);
}
.nav-right{display:flex;align-items:center;gap:10px;}

.hero{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:72px 24px;position:relative;z-index:1;
}

.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;padding:5px 14px;
  border-radius:100px;border:1px solid rgba(0,230,118,0.2);background:rgba(0,230,118,0.05);
  font-size:11px;font-family:var(--font-mono);color:var(--green);letter-spacing:0.07em;
  margin-bottom:28px;animation:fadeUp 0.6s ease both;
}

.hero-title{
  font-family:var(--font-display);font-size:clamp(34px,5.5vw,68px);
  font-weight:800;line-height:1.07;letter-spacing:-2px;color:var(--text-1);
  max-width:780px;margin-bottom:18px;animation:fadeUp 0.6s 0.1s ease both;
}
.hero-title .g{color:var(--green);}
.hero-title .dim{display:block;color:var(--text-2);font-weight:600;}

.hero-sub{
  font-size:16px;color:var(--text-2);max-width:500px;line-height:1.7;
  margin-bottom:36px;animation:fadeUp 0.6s 0.2s ease both;
}

.hero-cta{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;animation:fadeUp 0.6s 0.3s ease both;}

.hero-rule{width:100%;max-width:760px;margin:56px auto 0;border:none;border-top:1px solid var(--border);animation:fadeUp 0.6s 0.4s ease both;}

.hero-stats{
  display:flex;gap:44px;justify-content:center;flex-wrap:wrap;
  padding:28px 24px 0;animation:fadeUp 0.6s 0.5s ease both;
}
.stat-val{font-family:var(--font-display);font-size:26px;font-weight:800;color:var(--green);letter-spacing:-0.8px;}
.stat-lbl{font-size:11px;color:var(--text-3);font-family:var(--font-mono);letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* FEATURE STRIP */
.feat-strip{
  position:relative;z-index:1;display:flex;justify-content:center;flex-wrap:wrap;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface);
}
.feat-item{
  display:flex;align-items:center;gap:9px;padding:16px 24px;
  border-right:1px solid var(--border);font-size:13px;color:var(--text-2);
}
.feat-item:last-child{border-right:none;}
.feat-ic{
  width:26px;height:26px;background:var(--green-glow);border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;
}

/* PREVIEW SECTION */
.preview-wrap{position:relative;z-index:1;padding:72px 24px;max-width:860px;margin:0 auto;}
.sec-label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--green);margin-bottom:10px;}
.sec-title{font-family:var(--font-display);font-size:30px;font-weight:700;letter-spacing:-0.7px;margin-bottom:36px;color:var(--text-1);}

.chat-preview{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;
  box-shadow:0 28px 72px rgba(0,0,0,0.6),0 0 0 1px rgba(0,230,118,0.04);
}
.cp-header{
  display:flex;align-items:center;justify-content:space-between;padding:13px 18px;
  border-bottom:1px solid var(--border);background:var(--surface-2);
}
.cp-title{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--text-1);}
.cp-body{padding:22px;display:flex;flex-direction:column;gap:18px;}
.p-msg{display:flex;gap:11px;}
.p-msg.user{flex-direction:row-reverse;}
.p-av{
  width:30px;height:30px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--font-display);
}
.p-av.ai{background:var(--green-glow);border:1px solid rgba(0,230,118,0.2);color:var(--green);}
.p-av.usr{background:var(--surface-3);border:1px solid var(--border-2);color:var(--text-2);}
.p-lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-3);margin-bottom:3px;}
.p-bbl{max-width:460px;padding:11px 15px;border-radius:var(--radius-lg);font-size:14px;line-height:1.6;}
.p-bbl.ai{background:var(--surface-2);border:1px solid var(--border);color:var(--text-1);border-top-left-radius:2px;border-left:2px solid var(--green);}
.p-bbl.user{background:var(--green-glow);border:1px solid rgba(0,230,118,0.15);color:var(--text-1);border-top-right-radius:2px;}

/* HOME FOOTER */
.home-footer{
  position:relative;z-index:1;border-top:1px solid var(--border);padding:22px 40px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  background:var(--surface);
}
.foot-text{font-size:12px;color:var(--text-3);font-family:var(--font-mono);}
.foot-links{display:flex;gap:20px;}
.foot-link{font-size:11px;color:var(--text-3);text-decoration:none;transition:color 0.2s;}
.foot-link:hover{color:var(--green);}

/* ════════════════════════════════
   AUTH PAGES
════════════════════════════════ */
.auth-layout{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;}
@media(max-width:768px){.auth-layout{grid-template-columns:1fr;}.auth-panel{display:none;}}

.auth-panel{
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;justify-content:space-between;padding:38px;
  position:relative;overflow:hidden;
}
.auth-panel::before{
  content:'';position:absolute;top:-80px;right:-80px;width:360px;height:360px;
  background:radial-gradient(circle,rgba(0,230,118,0.06) 0%,transparent 70%);
  pointer-events:none;
}
.auth-panel::after{
  content:'';position:absolute;bottom:-60px;left:-60px;width:260px;height:260px;
  background:radial-gradient(circle,rgba(0,200,83,0.04) 0%,transparent 70%);
  pointer-events:none;
}

.ap-content{margin-top:52px;position:relative;z-index:1;}
.ap-eyebrow{font-family:var(--font-mono);font-size:10px;color:var(--green);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:14px;}
.ap-title{font-family:var(--font-display);font-size:34px;font-weight:800;line-height:1.15;letter-spacing:-1px;color:var(--text-1);margin-bottom:14px;}
.ap-title span{color:var(--green);}
.ap-sub{color:var(--text-2);font-size:14px;line-height:1.6;max-width:320px;}

.ap-features{display:flex;flex-direction:column;gap:12px;margin-top:40px;}
.ap-feat{
  display:flex;align-items:flex-start;gap:11px;padding:13px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);
}
.ap-feat-ic{
  width:30px;height:30px;background:var(--green-glow);border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ap-feat-title{font-size:13px;font-weight:600;color:var(--text-1);margin-bottom:1px;}
.ap-feat-desc{font-size:11px;color:var(--text-3);}

.ap-quote{
  padding:18px;border-left:2px solid var(--green);background:var(--green-glow2);
  border-radius:0 var(--radius) var(--radius) 0;position:relative;z-index:1;
}
.ap-quote p{font-size:13px;color:var(--text-2);font-style:italic;line-height:1.6;}
.ap-quote cite{display:block;font-style:normal;font-size:10px;color:var(--green);font-family:var(--font-mono);margin-top:7px;letter-spacing:0.05em;}

.auth-form-side{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:40px 24px;background:var(--black);position:relative;
}
.auth-form-side::before{
  content:'';position:absolute;bottom:-60px;left:-60px;width:280px;height:280px;
  background:radial-gradient(circle,rgba(0,230,118,0.03) 0%,transparent 70%);pointer-events:none;
}
.auth-box{width:100%;max-width:390px;position:relative;z-index:1;}
.auth-logo-top{display:flex;align-items:center;gap:10px;margin-bottom:36px;cursor:pointer;}
.auth-title{font-family:var(--font-display);font-size:24px;font-weight:700;letter-spacing:-0.5px;color:var(--text-1);margin-bottom:5px;}
.auth-sub{font-size:13px;color:var(--text-2);margin-bottom:28px;line-height:1.5;}
.auth-switch{text-align:center;font-size:13px;color:var(--text-3);margin-top:18px;}
.auth-lnk{color:var(--green);cursor:pointer;font-weight:500;text-decoration:none;}
.auth-lnk:hover{text-decoration:underline;}

/* FOUNDER BADGE on login */
.founder-badge{
  display:flex;align-items:center;gap:8px;padding:10px 13px;
  background:rgba(0,230,118,0.06);border:1px solid rgba(0,230,118,0.15);
  border-radius:var(--radius);margin-bottom:20px;
}
.fb-icon{font-size:20px;}
.fb-label{font-size:11px;color:var(--green);font-family:var(--font-mono);letter-spacing:0.06em;text-transform:uppercase;}
.fb-desc{font-size:11px;color:var(--text-3);margin-top:1px;}

/* ════════════════════════════════
   MOBILITYAI CHAT
════════════════════════════════ */
.chat-layout{
  height:100vh;display:grid;
  grid-template-rows:auto 1fr;
  grid-template-columns:256px 1fr;
  grid-template-areas:"sb topbar" "sb chat";
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  grid-area:sb;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-head{padding:15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sb-title{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text-1);}
.sb-new{
  width:27px;height:27px;border-radius:var(--radius);background:var(--green-glow);
  border:1px solid rgba(0,230,118,0.2);color:var(--green);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.2s;
}
.sb-new:hover{background:var(--green);color:var(--black);}
.sb-body{flex:1;overflow-y:auto;padding:7px;}
.sb-body::-webkit-scrollbar{width:3px;}
.sb-body::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px;}
.sb-section-lbl{
  font-family:var(--font-mono);font-size:9px;color:var(--text-3);
  letter-spacing:0.1em;text-transform:uppercase;padding:8px 8px 3px;
}
.sess-item{
